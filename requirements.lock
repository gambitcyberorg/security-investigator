# Security Investigation - Locked Dependencies
#
# This file pins exact versions with SHA-256 hashes to prevent supply chain attacks.
# Install with: pip install --require-hashes -r requirements.lock
#
# Generated: 2026-03-26 (updated to latest versions)
# Python: 3.12 (Windows x64)
#
# To update:
#   1. pip download --no-deps -d /tmp/hashes <package>==<new_version>
#   2. pip hash /tmp/hashes/<downloaded_file>.whl
#   3. Replace the version and hash below
#   4. Test: pip install --require-hashes -r requirements.lock
#
# Why this matters: The litellm supply chain attack (March 2026) exploited
# >=version specs to push malicious code to 46,996 users in 46 minutes.
# Pinned versions with hashes ensure pip will refuse to install any package
# that doesn't match the exact expected content.

